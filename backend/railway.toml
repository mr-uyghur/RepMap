[build]
builder = "nixpacks"
buildCommand = "cd .. && npm --prefix frontend ci && npm --prefix frontend run build && cd backend && pip install -r requirements/prod.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate --noinput && gunicorn repmap.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
healthcheckPath = "/api/health/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
