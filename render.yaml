services:
  - type: web
    name: repmap-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: >-
      pip install -r requirements/prod.txt &&
      python manage.py collectstatic --noinput
    startCommand: >-
      python manage.py migrate --noinput &&
      gunicorn repmap.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: DISTRICT_LIVE_FALLBACK
        value: "false"
      - key: AUTO_SYNC_ENABLED
        value: "true"
      - key: MAPBOX_TOKEN
        sync: false
      - key: CONGRESS_API_KEY
        sync: false
      - key: GOOGLE_CIVIC_API_KEY
        sync: false
